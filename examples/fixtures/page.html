<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>atelier-demo — goneIdle</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #110f1b;
      color: #f2cc8f;
      font-family: Inter, system-ui, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    main {
      max-width: 640px;
      padding: 2rem;
      text-align: center;
    }

    h1 {
      font-family: Silkscreen, monospace;
      font-size: 2rem;
      color: #e07a5f;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1.125rem;
      color: #81b29a;
      margin-bottom: 1.5rem;
    }

    button {
      background-color: #e07a5f;
      color: #110f1b;
      border: none;
      border-radius: 4px;
      padding: 0.625rem 1.5rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover {
      background-color: #f2cc8f;
    }
  </style>
</head>
<body>
  <main>
    <h1>atelier-demo</h1>
    <p>End-to-end design automation pipeline by goneIdle. Brand tokens, images, OG cards, and accessibility — all from one source of truth.</p>
    <button type="button">Get Started</button>
  </main>
</body>
</html>
